name: tests/run-partial-tests.sh
run-name: tests/run-partial-tests.sh${{ github.event_name == 'workflow_dispatch' && ! inputs.full && format(' Dockerfile.{0} with {1}', inputs.os, inputs.docker) || ' all' }} @ ${{ inputs.runs-on == '' && 'ubuntu-24.04' || inputs.runs-on }}

on:
  schedule:
    - cron: '42 3 1,15 * *'
  workflow_dispatch:
    inputs:
      full:
        description: Full set of tests
        required: true
        type: boolean
        default: false
      os:
        description: OS / Dockerfile
        type: string
      docker:
        description: docker or podman
        type: choice
        options:
          - docker
          - podman
      runs-on:
        description: Host Ubuntu version
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-24.04-arm

jobs:
  gen-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'schedule' || github.repository == 'freeipa/freeipa-container'
    outputs:
      matrix: ${{ steps.dispatch-matrix.outputs.matrix }}${{ steps.default-matrix.outputs.matrix }}
      runs-on: ${{ steps.get-runs-on.outputs.runs-on }}
    steps:
      - id: default-matrix
        run: |
          (
          echo -n "matrix={'os': [ 'fedora-rawhide', 'fedora-44', 'fedora-43', 'centos-9-stream', 'rocky-9', 'rocky-8', 'almalinux-10', 'almalinux-9', 'almalinux-8' ], \
          'docker': [ 'docker', 'podman' ] "
          if [ -n "${{ secrets.REDHAT_ORG }}" -a -n "${{ secrets.REDHAT_ACTIVATIONKEY }}" ] ; then
            echo -n ", 'include': [ \
              { 'os': 'rhel-10', 'docker': 'podman' }, \
              { 'os': 'rhel-9', 'docker': 'podman' }, \
              { 'os': 'rhel-8', 'docker': 'podman' } \
              ]"
          fi
          echo "}" ) | tee -a $GITHUB_OUTPUT
        if: github.event_name != 'workflow_dispatch' || inputs.full
      - id: dispatch-matrix
        run: |
          echo "matrix={'os': [ '${{ inputs.os }}' ], 'docker': [ '${{ inputs.docker }}' ]}" | tee -a $GITHUB_OUTPUT
        if: github.event_name == 'workflow_dispatch' && ! inputs.full
      - id: get-runs-on
        run: |
          RUNS_ON='${{ inputs.runs-on }}'
          RUNS_ON=${RUNS_ON:-ubuntu-24.04}
          echo "runs-on=$RUNS_ON" | tee -a $GITHUB_OUTPUT

  test:
    runs-on: ${{ needs.gen-matrix.outputs.runs-on }}
    needs: [ gen-matrix ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-matrix.outputs.matrix) }}
    if: github.event_name != 'schedule' || github.repository == 'freeipa/freeipa-container'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/docker-cgroups-ubuntu-22
        if: matrix.docker == 'docker'
      - run: mkdir -p ~/.config/containers && cp ci/containers-podman-5.conf ~/.config/containers/containers.conf
        if: matrix.docker == 'podman'
      - run: sudo apt update && sudo apt install -y apparmor-utils && sudo aa-complain --profile hostname smbd
        if: startsWith(needs.gen-matrix.outputs.runs-on, 'ubuntu-26.04') && matrix.docker == 'podman' && endsWith(matrix.os, '-8')
      - name: For RHEL builds, use entitlements
        if: ${{ startsWith(matrix.os, 'rhel-') }}
        uses: ./.github/actions/podman-entitlement
        with:
          org: ${{ secrets.REDHAT_ORG }}
          activationkey: ${{ secrets.REDHAT_ACTIVATIONKEY }}
      - name: Run partial tests
        run: docker=${{ matrix.docker }} tests/run-partial-tests.sh Dockerfile.${{ matrix.os }}
